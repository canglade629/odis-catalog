# Local run: app container using external Scaleway S3 and PostgreSQL.
# Usage: docker compose up --build
# Ensure .env has SCW_*, PG_* (or DATABASE_URL), ADMIN_SECRET.
# Publish 8080:8080 so Coolify (and local) can reach the app on 8080.

services:
  app:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    # Optional: pass env explicitly instead of file
    # environment:
    #   - SCW_OBJECT_STORAGE_ENDPOINT=${SCW_OBJECT_STORAGE_ENDPOINT}
    #   - SCW_BUCKET_NAME=${SCW_BUCKET_NAME}
    #   - PG_DB_HOST=${PG_DB_HOST}
    #   - PG_DB_PORT=${PG_DB_PORT}
    #   - PG_DB_NAME=${PG_DB_NAME}
    #   - PG_DB_USER=${PG_DB_USER}
    #   - PG_DB_PWD=${PG_DB_PWD}
    #   - ADMIN_SECRET=${ADMIN_SECRET}
    #   - ENVIRONMENT=${ENVIRONMENT}
    #   - CORS_ORIGINS=${CORS_ORIGINS}
