# Local run: app container using external Scaleway S3 and PostgreSQL.
# Usage: docker compose up --build
# Ensure .env has SCW_*, PG_* (or DATABASE_URL), ADMIN_SECRET.
# Coolify: no host port binding; Traefik routes via odace.services.d4g.fr.

services:
  app:
    build: .
    ports:
      - "8080"
    env_file:
      - .env
    labels:
      - traefik.enable=true
      - traefik.http.routers.odace.rule=Host(`odace.services.d4g.fr`)
      - traefik.http.routers.odace.entryPoints=webtls
      - traefik.http.routers.odace.tls=true
      - traefik.docker.network=d4g-internal
      - traefik.http.services.odace.loadbalancer.server.port=8080
    networks:
      - d4g-internal
    # Optional: pass env explicitly instead of file
    # environment:
    #   - SCW_OBJECT_STORAGE_ENDPOINT=${SCW_OBJECT_STORAGE_ENDPOINT}
    #   - SCW_BUCKET_NAME=${SCW_BUCKET_NAME}
    #   - PG_DB_HOST=${PG_DB_HOST}
    #   - PG_DB_PORT=${PG_DB_PORT}
    #   - PG_DB_NAME=${PG_DB_NAME}
    #   - PG_DB_USER=${PG_DB_USER}
    #   - PG_DB_PWD=${PG_DB_PWD}
    #   - ADMIN_SECRET=${ADMIN_SECRET}
    #   - ENVIRONMENT=${ENVIRONMENT}
    #   - CORS_ORIGINS=${CORS_ORIGINS}

networks:
  d4g-internal:
    external: true
