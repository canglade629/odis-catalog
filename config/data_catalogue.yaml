      siae_structure_sk:
        type: string
        nullable: false
        description: "Clé étrangère vers dim_siae_structure. Lie le poste à sa structure SIAE."
        example: "47ea585ea64fc56c67a2ab8ef0f144e0"
        
      poste_id:
        type: string
        nullable: false
        description: "Identifiant unique du poste dans le système source."
        example: "9474"
        
      structure_id:
        type: string
        nullable: false
        description: "Identifiant UUID de la structure parente (redondant avec FK pour référence)."
        example: "6d36ae53-f127-4405-a147-6c2979922964"
        
      structure_siret:
        type: string
        nullable: true
        description: "Numéro SIRET de la structure (redondant, pour faciliter les jointures)."
        example: "20004152300016"
        
      rome_code:
        type: string
        nullable: false
        description: "Code ROME du métier (Répertoire Opérationnel des Métiers et des Emplois de Pôle Emploi). Format: 1 lettre + 4 chiffres."
        example: "A1202"
        
      intitule_poste:
        type: string
        nullable: false
        description: "Intitulé/titre du poste. Peut être l'appellation modifiée ou l'intitulé ROME par défaut."
        example: "Agent d'aménagement paysager"
        
      description_poste:
        type: string
        nullable: true
        description: "Description détaillée du poste, des missions et des conditions de travail."
        example: "Plantation de fleurs en massif..."
        
      contrat_type:
        type: string
        nullable: false
        description: "Type de contrat proposé (ex: 'CDD insertion', 'CDI', 'Contrat aidé')."
        example: "CDD insertion"
        
      poste_disponible:
        type: boolean
        nullable: false
        description: "Indique si le poste est actuellement ouvert au recrutement (true) ou non (false)."
        example: true
        
      postes_nombre:
        type: integer
        nullable: false
        description: "Nombre de postes ouverts pour cette offre."
        example: 1
        
      creation_date_utc:
        type: timestamp
        nullable: true
        description: "Date et heure de création de l'offre de poste dans le système source."
        example: "2020-11-13 16:50:51.584467"
        
      modification_date_utc:
        type: timestamp
        nullable: true
        description: "Date et heure de dernière modification de l'offre dans le système source."
        example: "2025-12-02 07:25:17.755128"
        
      job_insert_id:
        type: string
        nullable: false
        description: "Identifiant du pipeline qui a créé l'enregistrement."
        example: "fact_siae_poste"
        
      job_insert_date_utc:
        type: timestamp
        nullable: false
        description: "Date et heure UTC de création dans la couche Silver."
        example: "2025-12-03 17:27:10.044"
        
      job_modify_id:
        type: string
        nullable: false
        description: "Identifiant du dernier pipeline ayant modifié l'enregistrement."
        example: "fact_siae_poste"
        
      job_modify_date_utc:
        type: timestamp
        nullable: false
        description: "Date et heure UTC de la dernière modification dans la couche Silver."
        example: "2025-12-03 17:27:10.044"

# Notes d'utilisation:
# - Toutes les clés surrogates (*_sk) sont des hash MD5 et servent de clés primaires/étrangères
# - Les champs job_* sont présents dans toutes les tables pour la traçabilité
# - Les coordonnées géographiques utilisent le système WGS84 (sauf mention Lambert 93)
# - Les timestamps sont toujours en UTC
# - Les FK nullable indiquent que l'enrichissement géographique peut échouer

