# Same as docker-compose.yml. Coolify uses docker-compose.yaml by default.
# No host port binding; Traefik routes via odace.services.d4g.fr.

services:
  app:
    build: .
    ports:
      - "8080"
    env_file:
      - .env
    labels:
      - traefik.enable=true
      - traefik.http.routers.odace.rule=Host(`odace.services.d4g.fr`)
      - traefik.http.routers.odace.entryPoints=webtls
      - traefik.http.routers.odace.tls=true
      - traefik.docker.network=d4g-internal
      - traefik.http.services.odace.loadbalancer.server.port=8080
    networks:
      - d4g-internal

networks:
  d4g-internal:
    external: true
